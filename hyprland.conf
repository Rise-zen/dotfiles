# ===== monitors =====
monitor = HDMI-A-1, 1920x1080@180, 0x0, 1
monitor = HDMI-A-2, 1920x1080@180, 1920x0, 1

# ===== env =====
env = WALLPAPER_DIR, /home/Rise/Wallpaper
env = QT_QPA_PLATFORM, wayland
env = QSG_RHI_BACKEND, vulkan
env = QSG_RENDER_LOOP, threaded
env = __GL_VRR_ALLOWED, 1
env = __GL_MaxFramesAllowed, 1

# ===== general =====
general {
    border_size = 2
    gaps_in = 4
    gaps_out = 8
    col.active_border = rgba(89b4faee)
    col.inactive_border = rgba(45475aaa)
}

# ===== decoration =====
decoration {
    rounding = 18
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 15
        render_power = 4
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = yes
        size = 8
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = true
        vibrancy = 0.1696
    }
}

# ===== input =====
input {
    kb_layout = us,ru
    kb_options = grp:alt_shift_toggle
    follow_mouse = 1
    sensitivity = 0
    force_no_accel = true
    numlock_by_default = true
    repeat_rate = 40
    repeat_delay = 250
    float_switch_override_focus = 0
}

# ===== animations =====
animations {
    enabled = yes

    bezier = specialWorkSwitch, 0.05, 0.7, 0.1, 1
    bezier = emphasizedAccel, 0.3, 0, 0.8, 0.15
    bezier = emphasizedDecel, 0.05, 0.7, 0.1, 1
    bezier = standard, 0.2, 0, 0, 1

    animation = layersIn, 1, 5, emphasizedDecel, slide
    animation = layersOut, 1, 4, emphasizedAccel, slide
    animation = fadeLayers, 1, 5, standard

    animation = windowsIn, 1, 5, emphasizedDecel
    animation = windowsOut, 1, 3, emphasizedAccel
    animation = windowsMove, 1, 6, standard

    animation = workspaces, 1, 5, standard
    animation = specialWorkspace, 1, 4, specialWorkSwitch, slidefadevert 15%

    animation = fade, 1, 6, standard
    animation = fadeDim, 1, 6, standard
    animation = border, 1, 6, standard
}

# ===== window rules =====
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# ===== variables =====
$mainMod = SUPER
$terminal = kitty
$browser = chromium
$qsm = ~/.config/hypr/scripts/qs_manager.sh

# ===== keybindings =====

# apps
bind = $mainMod, SPACE, exec, $terminal
bind = $mainMod, E, exec, $browser
bind = $mainMod, R, exec, wofi --show drun

# window control
bind = $mainMod, Q, killactive
bind = $mainMod, F, togglefloating

# workspaces
bind = $mainMod, 1, exec, $qsm 1
bind = $mainMod, 2, exec, $qsm 2
bind = $mainMod, 3, exec, $qsm 3
bind = $mainMod, 4, exec, $qsm 4
bind = $mainMod, 5, exec, $qsm 5
bind = $mainMod, 6, exec, $qsm 6
bind = $mainMod, 7, exec, $qsm 7
bind = $mainMod, 8, exec, $qsm 8
bind = $mainMod, 9, exec, $qsm 9
bind = $mainMod, 0, exec, $qsm 10

# move window to workspace
bind = $mainMod SHIFT, 1, exec, $qsm 1 move
bind = $mainMod SHIFT, 2, exec, $qsm 2 move
bind = $mainMod SHIFT, 3, exec, $qsm 3 move
bind = $mainMod SHIFT, 4, exec, $qsm 4 move
bind = $mainMod SHIFT, 5, exec, $qsm 5 move
bind = $mainMod SHIFT, 6, exec, $qsm 6 move
bind = $mainMod SHIFT, 7, exec, $qsm 7 move
bind = $mainMod SHIFT, 8, exec, $qsm 8 move
bind = $mainMod SHIFT, 9, exec, $qsm 9 move
bind = $mainMod SHIFT, 0, exec, $qsm 10 move

# mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# screenshot
bind = SUPER_SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy

# tile all on active workspace
bind = SUPER, T, exec, ws=$(hyprctl activeworkspace -j | jq -r '.id'); hyprctl clients -j | jq -r --argjson ws "$ws" '.[] | select(.workspace.id == $ws) | .address' | while read addr; do hyprctl dispatch settiled address:$addr; done

# quickshell popups / overlays
bind = SUPER, P, exec, $qsm toggle wallpaper
bind = $mainMod, S, exec, bash $qsm toggle calendar
bind = $mainMod, M, exec, bash $qsm toggle music
bind = $mainMod, N, exec, bash $qsm toggle network
bind = $mainMod, V, exec, bash $qsm toggle volume
bind = SUPER, O, exec, ~/Projects/zerkal/zerkal.sh toggle

# ===== autostart =====
exec-once = systemctl --user start hyprland-session.target
exec-once = hyprpolkitagent
exec-once = swayosd-libinput-backend
exec-once = playerctld daemon
exec-once = awww-daemon
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = cp ~/Projects/lyrics/target/release/lyrics ~/.local/bin/lyrics
exec-once = lyrics --json
exec-once = astrium watch --interval 200
exec-once = ~/.config/hypr/scripts/volume_listener.sh
exec-once = hyprctl dispatch exec "quickshell -p $HOME/.config/hypr/scripts/quickshell/Shell.qml"
exec-once = ~/Projects/zerkal/zerkal.sh start
exec-once = python3 ~/.config/hypr/scripts/quickshell/focustime/focus_daemon.py

# live palette from astrium
source = ~/.cache/astrium/colors-hyprland.conf
